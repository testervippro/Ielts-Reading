<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>IELTS & Japanese Reading</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 40px;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #000000;
}

h1 {
    margin-top: 0;
    margin-bottom: 36px;
    font-size: 38px;
}

.section-title {
    margin-top: 50px;
    margin-bottom: 22px;
    font-size: 28px;
}

.nav-container,
.grid {
    display: grid;
    gap: 16px;
}

.nav-container {
    grid-template-columns: repeat(
        auto-fit,
        minmax(260px, 1fr)
    );
}

.grid {
    grid-template-columns: repeat(
        auto-fill,
        minmax(220px, 1fr)
    );
}

.card {
    display: block;
    padding: 18px 20px;
    border: 2px solid #000;
    border-radius: 12px;
    text-decoration: none;
    color: #000;
    font-weight: 600;
    font-size: 16px;
    transition:
        background 0.2s ease,
        color 0.2s ease,
        transform 0.2s ease;
}

.card:hover {
    background: #000;
    color: #fff;
    transform: translateY(-3px);
}

.footer {
    margin-top: 70px;
    padding-top: 22px;
    border-top: 2px solid #000;
    font-size: 14px;
}

@media (max-width: 768px) {

    body {
        padding: 20px;
    }

    h1 {
        font-size: 30px;
    }

    .section-title {
        font-size: 24px;
    }
}

</style>

</head>

<body>

<h1>
    📚 IELTS Reading Library
</h1>


<!-- ========================= -->
<!-- IELTS Reading -->
<!-- ========================= -->

<h2 class="section-title">
    📖 IELTS Reading Practice
</h2>

<div
    id="reading-list"
    class="grid"
></div>


<!-- ========================= -->
<!-- Cambridge Listening -->
<!-- ========================= -->

<h2 class="section-title">
    🎧 Cambridge Listening
</h2>

<div
    id="listening-list"
    class="grid"
></div>


<script>

// =====================
// IELTS Reading
// =====================

const readingContainer =
    document.getElementById(
        "reading-list"
    );

for (let cam = 10; cam <= 20; cam++) {

    for (
        let test = 1;
        test <= 4;
        test++
    ) {

        const filename =
            `cleaned_cam${cam}_test${test}.html`;

        const a =
            document.createElement("a");

        a.href =
            filename;

        a.target =
            "_blank";

        a.className =
            "card";

        a.textContent =
            `📖 Cam ${cam} - Test ${test}`;

        readingContainer
            .appendChild(a);
    }
}


// =====================
// Cambridge Listening
// =====================

const listeningContainer =
    document.getElementById(
        "listening-list"
    );

for (let cam = 10; cam <= 20; cam++) {

    const a =
        document.createElement("a");

    a.href =
        `cam_listening/Cambridge_${cam}.html`;

    a.target =
        "_blank";

    a.className =
        "card";

    a.textContent =
        `🎧 Cambridge ${cam}`;

    listeningContainer
        .appendChild(a);
}

</script>


<div class="footer">
    IELTS Practice Reading Materials
</div>

</body>
</html>
